<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <meta http-equiv="refresh" content="30"> -->
    <title>Study Planner | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css">
</head>
<body>

<main>
<div class="wrapper d-flex">
    <nav id="sidebar" class="sidebar bg-dark-blue">
        <div class="sidebar-content p-4">
            <a class="sidebar-brand text-white text-decoration-none fw-bold fs-4">Study Planner</a>
            <ul class="nav flex-column mt-4">
                <li class="nav-item mb-2">
                    <a class="nav-link text-white active" href="index.html">Dashboard</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-white-50" href="all Tasks.html">All Tasks</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-white-50" href="#">Sessions</a>
                </li>
            </ul>
        </div>
    </nav>
<!--nav-->
    <div class="main flex-grow-1 bg-light">
        <main class="content p-4">
            <div class="container-fluid">
                <h1 class="h3 mb-4 fw-bold">Hello, <span class="text-primary">userName</span></h1>

                <div class="row">
                    <div class="col-xl-8 col-lg-7">
                        <div class="card border-0 shadow-sm mb-4">
                            <div class="card-body">
                                <button class="btn btn-success fw-bold px-4" onclick="togglePopup()">+</button>
                              <!--see more btn-->  
                              <a href="all Tasks.html" id="see-more-link" class="btn btn-link text-decoration-none mt-1" style="display:none;">See More Tasks...</a>
                            </div>
                        </div>
                        <div id="task-container"></div>
                    </div>
                    <!---calendar-->
                <div class="col-xl-4 col-lg-5"> 

              <div class="card shadow-sm border-0">
    <div class="card-body p-0">
         <div class="calendar-wrapper">
         <div id="calendar" class="calendar-card">
    <div class="calendar-front">
        <div class="calendar-header">
            <button id="prevMonth">&lt;</button>
            <h2 id="display-month"></h2>
            <button id="nextMonth">&gt;</button>
        </div>
        
        <div class="day-headers">
            <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
        </div>

        <div id="weeks-grid"></div>
    </div>
    </div>
        </div>
            </div>
                </div>


                    </div>
                    <!---end-calendar-->
                </div>
            </div>
        </main>
    </div>
</div>
</main>
<script src="js/main.js"></script>
<script src="js/calendar.js"></script>
<script>
		document.addEventListener("DOMContentLoaded", function() {
			var date = new Date(Date.now() - 5 * 24 * 60 * 60 * 1000);
			var defaultDate = date.getUTCFullYear() + "-" + (date.getUTCMonth() + 1) + "-" + date.getUTCDate();
			document.getElementById("datetimepicker-dashboard").flatpickr({
				inline: true,
				prevArrow: "<span title=\"Previous month\">&laquo;</span>",
				nextArrow: "<span title=\"Next month\">&raquo;</span>",
				defaultDate: defaultDate
			});
		});
	</script>
    <!--the pop window for the user to add task-->
    <div class="modal-overlay" id="popupOverlay">
    <div class="custom-popup">
        <h3>Create Task</h3>
        <hr>
        <div class="mb-3">
            <label class="form-label">Task Name</label>
            <input type="text" id="task-input" class="form-control" placeholder="Enter title...">
        </div>
        <div class="mb-3">
            <label class="form-label">Value</label>
            <input type="text" id="value-input" class="form-control" placeholder="Enter value...">
        </div>
        
        <div class="d-flex justify-content-end gap-2">
            <button class="btn btn-light" onclick="togglePopup()">Cancel</button>
            <button class="btn btn-primary" onclick="handleSave()">Save Task</button>
        </div>
    </div>
</div>
</body>

</html>

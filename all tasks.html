</head>

<body>

        <nav id="sidebar" class="sidebar bg-dark-blue">
            <div class="sidebar-content p-4">

                <ul class="nav flex-column mt-4">

        <div class="main-content flex-grow-1 p-4 bg-light min-vh-100">
    <div class="container-fluid">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h1 class="fw-bold">All Recorded Tasks</h1>
            <a href="index.html" class="btn btn-outline-primary fw-bold px-4">Back to Dashboard</a>
        </div>

        <div class="row">
            <div class="col-xl-8 col-lg-7">
                <div id="full-task-list" class="row g-4"></div>
            </div>

            <div class="col-xl-4 col-lg-5">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-0">
                        <div class="calendar-wrapper">
                            <div id="calendar" class="calendar-card">
                                <div class="calendar-front">
                                    <div class="calendar-header">
                                        <button id="prevMonth">&lt;</button>
                                        <h2 id="display-month"></h2>
                                        <button id="nextMonth">&gt;</button>
                                    </div>
                                    <div class="day-headers">
                                        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
                                    </div>
                                    <div id="weeks-grid"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div> </div>
</div>
    </div>
<script src="js/calendar.js"></script>
    <script>
        const ICONS = {
    trash: `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>`,
    check: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`
};
    document.addEventListener('DOMContentLoaded', () => {
        const tasks = JSON.parse(localStorage.getItem('myTasks')) || [];
        const container = document.getElementById('full-task-list');

        // Check if there are no tasks
        if (tasks.length === 0) {
            container.innerHTML = '<div class="col-12 text-center mt-5"><h4 class="text-muted">No tasks found.....<br>Go add some tasks</h4></div>';
            return;
        }

        // Render cards
        [...tasks].reverse().forEach(task => {
            const card = `
                <div class="col-12" id="task-${task.id}">
                    <div class="card m-2 shadow-sm border-0">
                        <div class="card-body">
                            <div class="row">
                                <div class="col mt-0">
                                    <h5 class="card-title text-muted">${task.title}</h5>
                                </div>
                            </div>
                            <h1 class="mt-1 mb-3 fw-bold">${task.value}</h1>
                            <div class="mb-0 d-flex justify-content-between align-items-center">
                                <span class="text-success small fw-bold">Active</span>
                                
                                <button class="btn text-danger p-0 fw-bold" onclick="deleteTask(${task.id})">
                                    ${ICONS.trash}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>`;
            container.insertAdjacentHTML('beforeend', card);
            if (window.feather) {
        feather.replace();
    }
        });
    });

    function deleteTask(id) {
        let tasks = JSON.parse(localStorage.getItem('myTasks')) || [];
        tasks = tasks.filter(t => t.id !== id);
        localStorage.setItem('myTasks', JSON.stringify(tasks));
        location.reload(); 
    }
</script>
    </script>
</body>

</html>

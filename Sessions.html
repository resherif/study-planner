<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner - Coffee Sessions</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style/sessions.css">
</head>
<body class="coffee-theme">
<div class="main-wrapper">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2 class="logo">Study<span>Planner</span></h2>
        </div>
        <nav class="nav-links">
            <a href="index.html">
                <i class="bi bi-grid-fill"></i> <span>Dashboard</span>
            </a>
            <a href="javascript:void(0)" onclick="showView('view-all-tasks')">
                <i class="bi bi-check2-square"></i> <span>All Tasks</span>
            </a>
            <a href="Sessions.html" class="active">
                <i class="bi bi-clock-history"></i> <span>Sessions</span>
            </a>
        </nav>
    </aside>

    
    <main class="main-content">
        <header class="page-header">
            <div class="header-text">
                <h1>Today's Sessions ☕</h1>
                <p>Track your productivity brew by brew.</p>
            </div>
            <a href="NewSession.html" class="btn-new">
                <i class="bi bi-plus-lg"></i> New Session
            </a>
        </header>

        
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="bi bi-award"></i></div>
                <div>
                    <p class="stat-label">Completed</p>
                    <p id="sessionCount" class="stat-value">0 Sessions</p>
                </div>
            </div>
            <div class="stat-card progress-card">
                <div class="stat-info">
                    <p class="stat-label">Weekly Goal</p>
                    <p id="weeklyGoal" class="stat-value">0/20</p>
                </div>
                <div class="progress-wrapper">
                    <div id="goalBar" class="progress-fill"></div>
                </div>
            </div>
        </section>

        
        <div id="sessionsContainer" class="sessions-grid">

        </div>

        
        <div id="emptyState" class="empty-state hidden">
            <div class="empty-icon">☕</div>
            <p>Your session history is empty. Start brewing!</p>
        </div>
    </main>
</div>

<script src="js/Sessions.js"></script>
</body>
</html>

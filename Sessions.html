<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner - Sessions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <nav class="bg-white shadow-sm p-4 mb-8">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h2 class="text-xl font-bold text-blue-600 italic">StudyPlanner.</h2>
            <div class="space-x-4">
                <a href="index.html" class="text-gray-600 hover:text-blue-500">Dashboard</a>
                <a href="Sessions.html" class="text-blue-600 font-semibold border-b-2 border-blue-600">Sessions</a>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10">
            <div>
                <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Today's Sessions 📖</h1>
                <p class="text-gray-500 mt-1">Manage your study time and track your progress.</p>
            </div>
            <button id="addSessionBtn" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 hover:-translate-y-0.5 transition-all flex items-center gap-2 w-fit">
                <i class="fas fa-plus text-sm"></i>
                New Session
            </button>
        </header>

        <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-xs text-gray-400 uppercase font-bold tracking-wider">Total Time</p>
                <p class="text-xl font-black text-gray-800">4.5 Hrs</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-xs text-gray-400 uppercase font-bold tracking-wider">Completed</p>
                <p class="text-xl font-black text-green-600">3 Sessions</p>
            </div>
        </section>

        <div id="sessionsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>

        <div id="emptyState" class="hidden text-center py-20">
            <i class="fas fa-ghost text-5xl text-gray-200 mb-4"></i>
            <p class="text-gray-400 text-lg">No sessions planned for today yet.</p>
        </div>
    </main>

    <script type="module" src="js/Sessions.js"></script>
</body>
</html>

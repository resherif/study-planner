<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner | Dashboard</title>
    <link rel="stylesheet" href="style/style.css">
    <style>
        /* Specific landing page layout */
/* General Landing Vibe */
.landing-container {
    height: 100vh;
    background: linear-gradient(135deg, #F5F5F5 0%, #D7CCC8 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* The SVG Illustration Container */
.study-gate-img {
    width: 250px;
    height: 250px;
    margin-bottom: 20px;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

.study-title {
    color: #3E2723; /* Espresso */
    font-size: 3.5rem;
    font-weight: 800;
    margin-bottom: 0.5rem;
}

.study-subtitle {
    color: #5D4037; /* Mocha */
    font-size: 1.1rem;
    margin-bottom: 40px;
}
input{
    margin: 10px;
}
/* The Main Button */
.btn-gate-primary {
    background-color: #3E2723 !important;
    color: #fff !important;
    border: none;
    padding: 15px 40px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 1.2rem;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 10px 20px rgba(62, 39, 35, 0.2);
}

.btn-gate-primary:hover {
    background-color: #5D4037 !important;
    transform: scale(1.05);
}

/* Modal Customization */
.modal-content {
    border-top: 10px solid #3E2723 !important;
    border-radius: 25px !important;
    background-color: #fff;
    width: 40%;
    height: 40%;
    display: flex;                  /* 1. Activate Flexbox */
    flex-direction: column;         /* 2. Stack elements on top of each other */
    justify-content: center;        /* 3. Center vertically */
    align-items: center;            /* 4. Center horizontally */
    
}
/* Styling the "Open" Button */
.btn.d-md-none i {
    color: #3E2723; /* Espresso color for the icon */
    transition: 0.3s;
}

/* Styling the Offcanvas (The actual menu box) */
#mobileSidebar {
    background-color: #3E2723 !important; /* Espresso background */
    border-right: 5px solid #D7CCC8; /* Latte border accent */
}

#mobileSidebar .nav-link {
    font-weight: 600;
    padding: 15px 20px;
    border-radius: 10px;
    margin-bottom: 5px;
    transition: 0.3s;
}

#mobileSidebar .nav-link:hover {
    background-color: rgba(215, 204, 200, 0.2); /* Soft Latte hover */
    color: #fff !important;
}

#mobileSidebar .nav-link.active {
    background-color: #8D6E63 !important; /* Cappuccino for active page */
    color: white !important;
}
.btn-gate-cancel {
    background: transparent;
    border: none;
    color: #8D6E63;
    font-weight: 600;
    cursor: pointer;
}
    </style>
</head>
<body>
  <div class="landing-container">
    <div class="study-gate-img">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <rect x="40" y="150" width="120" height="5" rx="2" fill="#D7CCC8"/>
            <path d="M130 130 h20 a5 5 0 0 1 5 5 v10 a5 5 0 0 1 -5 5 h-20 z" fill="none" stroke="#3E2723" stroke-width="3"/>
            <rect x="125" y="125" width="25" height="25" rx="5" fill="#3E2723"/>
            <path d="M132 115 q2 -5 0 -10 M137 115 q2 -5 0 -10" stroke="#8D6E63" stroke-width="2" fill="none"/>
            <rect x="60" y="130" width="50" height="10" rx="2" fill="#5D4037"/>
            <rect x="65" y="120" width="40" height="10" rx="2" fill="#8D6E63"/>
            <rect x="70" y="110" width="30" height="10" rx="2" fill="#3E2723"/>
        </svg>
    </div>

    <h1 class="study-title">Ready to Study?</h1>
    <p class="study-subtitle">Your personal cozy workspace is waiting for you...</p>
    
    <button class="btn-gate-primary" onclick="goToPlanner()">
        Open Study Gate ☕
    </button>

    <div id="nameModal" class="modal-overlay" style="display: none;">
        <div class="modal-content shadow-lg">
            <h3 class="fw-bold mb-3" style="color: #3E2723;">What's your name?</h3>
            <p class="text-muted">Grab a coffee and tell us who you are.</p>
            <input type="text" id="userNameInput" class="form-control mb-4" placeholder="Your Name..." autofocus>
            <div class="d-flex gap-2 justify-content-center">
                <button class="btn-gate-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-gate-primary px-2" onclick="saveAndGo()">Let's Go!</button>
            </div>
        </div>
    </div>
</div>
    <!--windo for the user to enter his name-->
    <script src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Planner | Dashboard</title>
    <link rel="stylesheet" href="style/style.css">
    <style>
        /* Specific landing page layout */
        .landing-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-color: var(--bg-light);
        }
        .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5); /* Dimmed background */
    backdrop-filter: blur(5px);      /* Stylish blur */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.modal-content {
    background: white;
    padding: 2.5rem;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    border: none;
}

#userNameInput {
    border-radius: 10px;
    padding: 12px;
    border: 2px solid #eee;
}

#userNameInput:focus {
    border-color: var(--main-blue);
    box-shadow: none;
}
    </style>
</head>
<body>
   <div class="landing-container">
        <h1 style="color: var(--main-blue); font-size: 3rem;">Ready to Study?</h1>
        <p style="color: #666; font-size: 1.2rem; margin-bottom: 30px;">
            Your personal task management space is waiting.....
        </p>
        
        <button class="btn btn-primary btn-lg" onclick="goToPlanner()">
            Go to Study Planner
        </button>
    </div>

    <!--windo for the user to enter his name-->
    <div id="nameModal" class="modal-overlay" style="display: none;">
    <div class="modal-content shadow-lg">
        <h3 class="fw-bold mb-3" style="color: var(--main-blue);">What's your name?</h3>
        <p class="text-muted">Enter your name to personalize your workspace.</p>
        <input type="text" id="userNameInput" class="form-control mb-4" placeholder="Your Name..." autofocus>
        <div class="d-flex gap-2 justify-content-center">
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary px-4" onclick="saveAndGo()">Let's Go!</button>
        </div>
    </div>
</div>
    <!--windo for the user to enter his name-->
    <script src="js/main.js"></script>
</body>
</html>
